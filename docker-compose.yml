services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports: ["8123:8123"]              # HTTP-интерфейс наружу — для экспериментов с хоста
    environment:
      CLICKHOUSE_DB: telemetry
      CLICKHOUSE_USER: app
      CLICKHOUSE_PASSWORD: app
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile: 262144

  php:
    build: docker/php
    # UID/GID host-пользователя, чтобы app/vendor и app/var были ему доступны на
    # запись (bind-mount ./app:/app). По умолчанию 1000 (типичный dev-юзер);
    # на root-овском чекауте (например, сервер) задайте APP_UID/APP_GID:
    #   APP_UID=$(id -u) APP_GID=$(id -g) docker compose up -d
    # или пропишите их в корневой .env рядом с docker-compose.yml.
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    environment:
      HOME: /tmp
    volumes:
      - ./app:/app
      - ./docs:/docs:ro          # эталонные конфиги для few-shot промптов ИИ
    working_dir: /app
    depends_on: [clickhouse]

  nginx:
    image: nginx:1.27-alpine
    ports: ["8081:80"]   # 8080 на этой машине занят другим проектом
    volumes:
      - ./app:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]

volumes:
  clickhouse-data:
